<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>大健康俱樂部 Demo</title>
<style>
  :root {
    color-scheme: light;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    background:
      radial-gradient(circle at top left, rgba(226, 211, 177, 0.32), transparent 26%),
      linear-gradient(160deg, #faf9f6 0%, #f3f0eb 45%, #ebe7df 100%);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif;
    color: #141414;
  }
  .card {
    width: min(680px, 100%);
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(20, 20, 20, 0.08);
    box-shadow: 0 24px 60px -36px rgba(20, 20, 20, 0.35);
    padding: 32px;
  }
  h1 {
    margin: 0 0 12px;
    font-size: clamp(28px, 4vw, 40px);
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  p {
    margin: 0 0 20px;
    line-height: 1.8;
    color: #3a3a3a;
  }
  .actions {
    display: grid;
    gap: 12px;
  }
  a {
    display: block;
    padding: 14px 16px;
    border: 1px solid #d8d3c9;
    color: #141414;
    text-decoration: none;
    background: linear-gradient(180deg, #ffffff 0%, #f7f4ef 100%);
  }
  .primary {
    background:
      radial-gradient(circle at top left, rgba(226, 211, 177, 0.16), transparent 34%),
      linear-gradient(145deg, #3a342f 0%, #26211d 44%, #141311 100%);
    border-color: #141311;
    color: #ffffff;
  }
</style>
</head>
<body>
  <main class="card">
    <h1>大健康俱樂部提案預覽</h1>
    <p>請優先開啟「靜態閱讀版」，這份不依賴外部 CDN，也不需要互動編譯，最適合在 IAB 直接閱讀。</p>
    <div class="actions">
      <a class="primary" href="./presentation.html?v=1">開啟靜態閱讀版</a>
      <a href="./interactive.html?v=1">開啟互動版</a>
      <a href="./%E5%A4%A7%E5%81%A5%E5%BA%B7%E9%9B%99%E9%9D%A2%E6%9D%BF%20Demo.html?v=1">開啟原中文檔名版本</a>
    </div>
  </main>
</body>
</html>
